{% extends "base.html" %}
{% block title %}Xavfsiz To'lov — SMMZone.uz{% endblock %}

{% block content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Syne:wght@800&display=swap');

  :root {
    --bg: #020617;
    --card: rgba(15, 23, 42, 0.8);
    --accent: #38bdf8;
    --accent-glow: rgba(56, 189, 248, 0.25);
    --border: rgba(56, 189, 248, 0.15);
    --safe: #10b981;
    --danger: #ef4444;
    --text-main: #f1f5f9;
    --text-muted: #94a3b8;
  }

  body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-main); }
  .payment-container { max-width: 650px; margin: 40px auto; padding: 0 20px; }

  .main-card {
    background: var(--card);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 32px;
    padding: 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    position: relative;
    overflow: hidden;
  }

  /* Method Selector */
  .method-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
  .method-item {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    padding: 15px 10px; border-radius: 16px; cursor: pointer; text-align: center;
    transition: 0.3s; font-size: 12px; font-weight: 600;
  }
  .method-item:hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.05); }
  .method-item.selected { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }
  .method-item i { display: block; font-size: 20px; margin-bottom: 8px; }

  /* Forms & UI */
  .input-group { text-align: center; margin: 30px 0; }
  .input-group input {
    background: transparent; border: none; border-bottom: 2px solid var(--border);
    width: 80%; font-family: 'Syne', sans-serif; font-size: 40px; color: #fff;
    text-align: center; outline: none; transition: 0.3s;
  }
  .digital-card {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    border-radius: 24px; padding: 30px; margin: 25px 0; border: 1px solid rgba(255,255,255,0.05);
  }
  .copy-btn {
    background: rgba(56, 189, 248, 0.1); border: 1px solid var(--accent);
    color: var(--accent); padding: 8px 15px; border-radius: 10px; cursor: pointer;
  }

  .btn-submit {
    width: 100%; padding: 20px; border-radius: 18px; border: none;
    background: var(--accent); color: #002; font-weight: 800; cursor: pointer;
  }
  .hidden { display: none; }
  #timer-display { font-family: 'Syne', sans-serif; font-size: 28px; color: var(--accent); text-align: center; margin-bottom: 10px; }
</style>

<div class="payment-container">
  <div class="main-card">
    <div style="text-align: center; margin-bottom: 25px;">
        <h1 style="font-family: 'Syne'; font-size: 26px; margin: 0;">Balansni To'ldirish</h1>
    </div>

    <!-- Payment Methods -->
    <div class="method-grid" id="method-selector">
      <div class="method-item" onclick="selectMethod('uzcard', this)">
        <i class="fas fa-credit-card"></i> Uzcard
      </div>
      <div class="method-item" onclick="selectMethod('humo', this)">
        <i class="fas fa-credit-card"></i> Humo
      </div>
      <div class="method-item" onclick="selectMethod('visa', this)">
        <i class="fab fa-cc-visa"></i> Visa/Master
      </div>
      <div class="method-item" onclick="selectMethod('ton', this)">
        <i class="fas fa-gem"></i> Tonkeeper
      </div>
      <div class="method-item" onclick="selectMethod('usd', this)">
        <i class="fas fa-dollar-sign"></i> USD (Tether)
      </div>
    </div>

    <form action="/add-funds" method="POST" enctype="multipart/form-data" id="main-form">
      <input type="hidden" name="payment_method" id="selected-method-input">

      <!-- PHASE 1: Summa -->
      <div id="p1">
        <div class="input-group">
          <input type="number" id="summa" name="amount" placeholder="0" min="5000">
          <div id="currency-label" style="color: var(--accent); font-weight: 700; margin-top: 10px; font-size: 11px;">O'ZBEK SO'MI (UZS)</div>
        </div>
        <button type="button" class="btn-submit" onclick="goStep2()">To'lovni davom ettirish</button>
      </div>

      <!-- PHASE 2: Payment Details -->
      <div id="p2" class="hidden">
        <div id="timer-display">10:00</div>

        <div id="card-details" class="digital-card">
          <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 10px; letter-spacing: 2px;">QABUL QILUVCHI</div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span style="font-family: 'Syne'; font-size: 19px; letter-spacing: 2px;" id="card-num-display">0000 0000 0000 0000</span>
            <button type="button" class="copy-btn" onclick="copyNum()">NUSXA</button>
          </div>
          <div style="font-weight: 600; color: var(--safe); font-size: 14px;" id="card-owner-display">ISM SHARIF</div>
        </div>

        <div id="error-message" class="hidden" style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); padding: 20px; border-radius: 15px; text-align: center; color: #fca5a5; margin: 20px 0;">
            <i class="fas fa-exclamation-circle"></i> <span id="error-text"></span>
        </div>

        <div id="upload-section">
          <div style="background: rgba(255,255,255,0.02); border: 1px dashed var(--border); border-radius: 20px; padding: 20px; margin-top: 10px;">
            <label style="display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 10px; text-align: center;">TO'LOV CHEKINI YUKLANG</label>
            <input type="file" name="check_file" id="file-input" style="width: 100%; font-size: 12px;">
          </div>
          <button type="submit" class="btn-submit" style="margin-top: 20px;">Tasdiqlashga yuborish</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
  let selectedMethod = '';

  function selectMethod(method, element) {
    selectedMethod = method;
    document.getElementById('selected-method-input').value = method;

    // UI selection
    document.querySelectorAll('.method-item').forEach(el => el.classList.remove('selected'));
    element.classList.add('selected');
  }

  function goStep2() {
    const amount = document.getElementById('summa').value;

    if (!selectedMethod) {
      alert("Iltimos, to'lov usulini tanlang!");
      return;
    }
    if (amount < 5000) {
      alert("Minimal to'lov 5,000 so'm");
      return;
    }

    const cardDetails = document.getElementById('card-details');
    const uploadSection = document.getElementById('upload-section');
    const errorMsg = document.getElementById('error-message');
    const errorText = document.getElementById('error-text');
    const numDisp = document.getElementById('card-num-display');
    const ownerDisp = document.getElementById('card-owner-display');

    // Reset view
    cardDetails.classList.add('hidden');
    uploadSection.classList.add('hidden');
    errorMsg.classList.add('hidden');

    if (selectedMethod === 'uzcard') {
        numDisp.textContent = '5614 6835 8365 4223';
        ownerDisp.textContent = 'Iskandarov Azizbek';
        cardDetails.classList.remove('hidden');
        uploadSection.classList.remove('hidden');
    }
    else if (selectedMethod === 'visa') {
        numDisp.textContent = '4916 9903 1159 8418';
        ownerDisp.textContent = 'Zubayda Aliyeva';
        cardDetails.classList.remove('hidden');
        uploadSection.classList.remove('hidden');
    }
    else if (selectedMethod === 'humo') {
        errorText.textContent = "Humo hozircha mavjud emas";
        errorMsg.classList.remove('hidden');
    }
    else if (selectedMethod === 'ton' || selectedMethod === 'usd') {
        errorText.textContent = "USD va Toncoin bilan vaqtincha ishlamayapti";
        errorMsg.classList.remove('hidden');
    }

    document.getElementById('p1').classList.add('hidden');
    document.getElementById('p2').classList.remove('hidden');
    if (!errorMsg.classList.contains('hidden')) {
        document.getElementById('timer-display').classList.add('hidden');
    } else {
        startTimer(600);
    }
  }

  function startTimer(sec) {
    let t = sec;
    const el = document.getElementById('timer-display');
    el.classList.remove('hidden');
    const inter = setInterval(() => {
      let m = Math.floor(t / 60);
      let s = t % 60;
      el.textContent = `${m}:${s < 10 ? '0'+s : s}`;
      if (--t < 0) { clearInterval(inter); el.textContent = "VAQT TUGADI"; }
    }, 1000);
  }

  function copyNum() {
    const txt = document.getElementById('card-num-display').textContent;
    navigator.clipboard.writeText(txt.replace(/\s/g, ''));
    alert("Nusxalandi!");
  }
</script>
{% endblock %}
